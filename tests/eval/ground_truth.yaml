  keywords: ["self-attention", "multi-head", "cross-attention", "hard attention"]
  eval_type: semantic
  difficulty: hard
  notes: "Requires reading and synthesizing the attention types table."

- id: html-06
  dataset: eval_html
  query: "Why is the scaling factor 1/sqrt(d_k) applied in scaled dot-product attention?"
  expected: "To prevent large dot products from pushing the softmax function into regions with extremely small gradients"
  keywords: ["gradient", "softmax", "large dot products"]
  eval_type: semantic
  difficulty: medium
  notes: "Reasoning-based retrieval from the formula explanation section."

