# HetaDB Evaluation Ground Truth
# Format:
#   id:           unique identifier
#   dataset:      dataset name (must match raw_files directory)
#   query:        the question sent to the query API
#   expected:     exact short answer (used for keyword match scoring)
#   keywords:     list of strings that MUST appear in the response (case-insensitive)
#   eval_type:    exact | semantic | structural | negative | multihop
#   difficulty:   easy | medium | hard
#   notes:        optional explanation

# ─────────────────────────────────────────────────────────────
# eval_text — transformer_paper.txt + llm_overview.md
# ─────────────────────────────────────────────────────────────

- id: text-01
  dataset: eval_text
  query: "What BLEU score did the Transformer big model achieve on WMT 2014 English-to-German translation? Please answer in English."
  expected: "28.4"
  keywords: ["28.4", "BLEU", "English-to-German"]
  eval_type: exact
  difficulty: easy
  notes: "Direct numeric fact. Answer is in transformer_paper.txt section 4."

- id: text-02
  dataset: eval_text
  query: "How many encoder layers does the base Transformer model use? Please answer in English."
  expected: "6"
  keywords: ["6", "encoder", "layers"]
  eval_type: exact
  difficulty: easy
  notes: "Explicit in model architecture section: N=6 identical layers."

- id: text-03
  dataset: eval_text
  query: "How many parallel attention heads does the Transformer use in multi-head attention?"
  expected: "8"
  keywords: ["8", "attention heads", "multi-head"]
  eval_type: exact
  difficulty: easy
  notes: "h=8 stated explicitly in section 2.2."

- id: text-04
  dataset: eval_text
  query: "Who proposed scaled dot-product attention and multi-head attention within the Transformer team?"
  expected: "Noam Shazeer"
  keywords: ["Noam Shazeer"]
  eval_type: exact
  difficulty: medium
  notes: "Attribution fact buried in author contribution notes."

- id: text-05
  dataset: eval_text
  query: "How much smaller is DistilBERT compared to BERT-Large, and how much faster is it?"
  expected: "40% smaller and 60% faster"
  keywords: ["40%", "60%", "DistilBERT"]
  eval_type: exact
  difficulty: medium
  notes: "Multi-attribute fact from llm_overview.md."

- id: text-06
  dataset: eval_text
  query: "How many pages is the survey paper 'A Survey of Large Language Models' on arXiv?"
  expected: "144"
  keywords: ["144", "pages"]
  eval_type: exact
  difficulty: medium
  notes: "Specific metadata fact from llm_overview.md."

- id: text-07
  dataset: eval_text
  query: "What are the four emergent abilities mentioned for large language models?"
  expected: "in-context learning, instruction following, chain-of-thought reasoning, code generation"
  keywords: ["in-context learning", "chain-of-thought", "instruction"]
  eval_type: semantic
  difficulty: hard
  notes: "Requires synthesizing a list from the emergent abilities section."

- id: text-08
  dataset: eval_text
  query: "What are the names of the anonymous reviewers who reviewed the Transformer paper before publication? Please answer in English."
  expected: "The document does not mention reviewer names. Peer review identities are not disclosed in the paper."
  keywords: []
  eval_type: negative
  difficulty: medium
  notes: "Negative test: reviewer names are never published. System must not hallucinate names."

