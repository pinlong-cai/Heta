- id: html-01
  dataset: eval_html
  query: "Who authored the original neural attention mechanism paper for machine translation?"
  expected: "Dzmitry Bahdanau, Kyunghyun Cho, and Yoshua Bengio"
  keywords: ["Bahdanau", "Cho", "Bengio"]
  eval_type: exact
  difficulty: easy
  notes: "Author attribution in HTML section 1."

- id: html-02
  dataset: eval_html
  query: "At which conference was the Bahdanau attention paper accepted and in what presentation format?"
  expected: "ICLR 2015, oral presentation"
  keywords: ["ICLR 2015", "oral"]
  eval_type: exact
  difficulty: easy
  notes: "Two-part answer from HTML metadata block."

- id: html-03
  dataset: eval_html
  query: "What is the computational complexity per layer for self-attention?"
  expected: "O(n squared times d)"
  keywords: ["O(n²", "n²"]
  eval_type: exact
  difficulty: medium
  notes: "From the complexity comparison table in the HTML."

- id: html-04
  dataset: eval_html
  query: "What is the sequential operations complexity for recurrent (RNN) layers?"
  expected: "O(n)"
  keywords: ["O(n)", "sequential"]
