# ─────────────────────────────────────────────────────────────
# eval_mixed — transformer_paper.txt + llm_models.csv
# Multi-hop: requires connecting facts across files
# ─────────────────────────────────────────────────────────────

- id: mixed-01
  dataset: eval_mixed
  query: "The Transformer paper's training used 8 NVIDIA P100 GPUs. According to the models table, which year was GPT-3 released and how many parameters does it have?"
  expected: "GPT-3 was released in 2020 and has 175 billion parameters"
  keywords: ["2020", "175", "GPT-3"]
  eval_type: multihop
  difficulty: medium
  notes: "Part 1 from TXT, Part 2 from CSV. Tests cross-file retrieval."

- id: mixed-02
  dataset: eval_mixed
  query: "The Transformer uses 8 attention heads and d_model=512. What dimension does each head operate in, and which organization released a model with 530 billion parameters in 2021?"
  expected: "Each head operates in dimension 64 (512/8=64). The 530B model is Megatron-Turing NLG by Microsoft and NVIDIA."
  keywords: ["64", "530", "Megatron", "Microsoft", "NVIDIA"]
  eval_type: multihop
  difficulty: hard
  notes: "Requires arithmetic from TXT (512/8=64) and CSV lookup for 530B model."

- id: mixed-03
  dataset: eval_mixed
  query: "The Transformer big model was trained for 3.5 days on 8 GPUs. How many models in the CSV table were released after 2022 with Apache 2.0 license?"
  expected: "Mistral 7B (2023), Falcon (2023), Gemma 2B (2024), Gemma 7B (2024), Qwen2 72B (2024) — 5 models"
  keywords: ["Mistral", "Falcon", "Gemma", "Qwen", "5"]
  eval_type: multihop
  difficulty: hard
  notes: "TXT sets context; CSV filter: year > 2022 AND license = Apache 2.0. Qualifiers: Mistral 7B, Falcon, Gemma 2B, Gemma 7B, Qwen2 72B = 5."
