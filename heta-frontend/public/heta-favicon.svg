<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF6EF"/>
      <stop offset="100%" stop-color="#EDE5D8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FBBF73"/>
    </linearGradient>
    <linearGradient id="nodeA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA6010"/>
    </linearGradient>
    <linearGradient id="nodeB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8A870"/>
      <stop offset="100%" stop-color="#B8945A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <line x1="16" y1="3" x2="16" y2="29" stroke="#C8A870" stroke-width="0.15" stroke-opacity="0.25"/>
  <line x1="3" y1="16" x2="29" y2="16" stroke="#C8A870" stroke-width="0.15" stroke-opacity="0.25"/>

  <g stroke="url(#accent)" stroke-opacity="0.35" stroke-width="0.75">
    <line x1="16" y1="16" x2="8.5" y2="9"/>
    <line x1="16" y1="16" x2="23.5" y2="9"/>
    <line x1="16" y1="16" x2="8.5" y2="23"/>
    <line x1="16" y1="16" x2="23.5" y2="23"/>
    <line x1="8.5" y1="9" x2="23.5" y2="9" stroke-opacity="0.18"/>
    <line x1="8.5" y1="23" x2="23.5" y2="23" stroke-opacity="0.18"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="8.5"  cy="9"  r="2.2" fill="url(#nodeA)" fill-opacity="0.95"/>
    <circle cx="23.5" cy="9"  r="2.2" fill="url(#nodeB)" fill-opacity="0.95"/>
    <circle cx="8.5"  cy="23" r="2.2" fill="url(#nodeB)" fill-opacity="0.95"/>
    <circle cx="23.5" cy="23" r="2.2" fill="url(#nodeA)" fill-opacity="0.95"/>
  </g>

  <circle cx="16" cy="16" r="3.8" fill="#EDE5D8" stroke="url(#accent)" stroke-width="1.1"/>
  <circle cx="16" cy="16" r="2.1" fill="url(#accent)" fill-opacity="0.95" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="0.75" fill="#FFF8F0" fill-opacity="0.95"/>
</svg>
