node_prompt: |-
  你是一名知识抽取与标准化专家。  
  我将提供一段文本及从属性映射表。  
  你的任务是根据下方【属性映射表】为节点进行属性补全、标准化输出，并进行代词指代消解。
  属性表（节点及属性）：
  {entity_schema}
  必须严格遵守以下规则：

  【1】输出要求：
  - 输出格式必须是 **JSON 数组**，不包含任何解释或说明性文字。
  - 数组中每个对象代表一个节点。
  - 每个节点对象结构如下：
    {{
      "NodeName": "节点名称",
      "Type":"表中对应的一级节点名称 ",
      "SubType": "表中对应的三级节点名称",
      "Description": "对于实体的总结描述，1-2句凝练的总结Node的话",
      "属性名1": "属性值1",
      "属性名2": "属性值2",
      ...
    }}

  【2】映射与过滤规则：
  - 仅能使用【属性映射表】中明确出现的节点和属性。
  - 若节点或属性无法精确映射，直接舍弃，不输出该节点。
  - 严禁输出无意义节点，如“该行为”“他们”“本公司”等。
  - SubType仅能为表中的三级节点名称，若无法映射到表中，则进行舍弃。

  【3】代词与模糊表达解析：
  - 代词（如“本公司”“该产品”“它”）必须解析为具体实体名称。
  - 若上下文无法确定代词指向，结合title进行补充，若无法补充，则舍弃。
  - 当属性中包含多个值（如多个主语、多个日期），需拆分为独立条目。

  【4】属性限制：
  - 所有未严格限制的值均为简体中文。
  - 保持语义正确，对于 中文名称 这类限制中文的属性 输出必须为简体中文，对于英文名称这类限制英文的属性 输出必须为英文，若提取不到则舍弃。
  - 严格限制在映射表列出的属性范围内。
  - 不允许新增、推测或扩展任何表中未列属性。

  【5】时间规范：
  - 所有涉及时间的属性（如成立日期、出生日期、发布日期、任职起止日期等）需转换为公元纪年格式（YYYY-MM-DD 或 YYYY）。

  【6】字段控制：
  - 不输出 Id、chunk_id 或其他与节点标识相关的字段。
  - 仅输出语义有效的属性信息。

  【7】输入格式】
  Text: {input_text}

  【8】输出格式（示例）】
  [
    {{
      "NodeName": "上海市",
      "Type": "Entity",
      "SubType": "行政区划",
      "Description": "中华人民共和国直辖市，国家中心城市，国际经济、金融、贸易、航运和科技创新中心",
      "行政区划中文名称": "上海市",
      "行政区划所属国家": "中华人民共和国",
      "行政区划级别": "省级（直辖市）",
      "行政区划设立日期": "1927-07-07"
    }},
    {{
      "NodeName": "大熊猫",
      "Type": "Entity",
      "SubType": "生物物种",
      "Description": "中国特有哺乳动物，属于食肉目熊科，以竹子为主食，是国家一级保护动物和世界自然保护联盟濒危物种",
      "物种中文名称": "大熊猫",
      "物种学名": "Ailuropoda melanoleuca",
      "物种分类": "哺乳纲-食肉目-熊科-大熊猫属",
      "保护等级": "国家一级重点保护野生动物 / IUCN 濒危（EN）",
      "主要分布地区": "中国四川、陕西、甘肃等地的山区"
    }}
  ]

rel_prompt: |-
  你是一名知识图谱结构化抽取专家。  
  我将提供一段文本，从文本中提取的节点列表，以及【关系映射表】。  
  你的任务是根据下方【关系映射表】进行标准化筛选与补全，  
  并严格输出符合映射表定义的关系。

  关系表:
  {relation_schema}

  -------------------

  【字段约束】
  1. `"Type"` 字段仅能使用映射表中 **“关系类型”** 列中的值。  
  2. `"Relation"` 字段仅能使用映射表中 **“关系”** 列中的值。  
  3. 若生成内容中 `"Type"` 或 `"Relation"` 不属于映射表定义值，**直接舍弃**。  
  4. `"Description"` 必须为自然语言描述，体现出 `"Node1"` 与 `"Node2"` 的关系。
  5. 生成内容必须均为简体中文。  

  ---

  【严格逻辑约束】
  1. **仅限表内关系**
     - 只能抽取映射表中存在的关系。
     - 不在表中的任何关系一律不输出。

  2. **节点类型严格匹配**
     - 关系中的节点仅能从提供的Nodes以及Relation中复用或者改写，禁止生成额外的关系。
     - 若起点或终点类型不匹配，直接舍弃。

  3. ****方向性校验****
     - 关系方向必须与映射表保持一致（例如子公司关系：母 → 子）。
     - 方向反转或歧义关系不输出。

  4. **时间规范**
     - 若涉及时间，统一转为公元纪年格式（YYYY-MM-DD 或 YYYY）。

  5. **禁止自由生成**
     - 不得生成映射表外的新关系类型、语义或节点类型。
     - 不得输出任何解释、注释或自然语言段落。
  6. **实体语义约束**

    - 所有关系中的实体必须是有意义且具体的命名实体。
    - 禁止输出含模糊指代的实体（如“该公司”“本单位”“它们”“产品”“这些”等）。
    - 语料中的实体尽可能要有明确的名称。  
  7. **描述生成要求**
    - "Description" 字段为简短简体中文描述（1–2句），需结合语料上下文与关系含义撰写。
    - 应生成自然、流畅的简体中文总结。
  -------------------

  【输入格式】
  Text: {input_text}
  Nodes: {nodes}

  【5】输出格式（示例）】
  [
    {{
      "Node1": "上海市",
      "Node2": "徐汇区",
      "Type": "空间关系",
      "Relation": "包含行政区",
      "Description": "徐汇区是上海市下辖的市辖区，位于上海市中心城区西南部，是上海市的重要组成部分。"
    }},
    {{
      "Node1": "大熊猫",
      "Node2": "北极熊",
      "Type": "关联关系",
      "Relation": "均为熊科动物",
      "Description": "大熊猫和北极熊均为熊科动物，但大熊猫主要分布于中国四川、陕西等地的温带山区，以竹子为主食；北极熊则生活在北极圈内，是顶级肉食性掠食者，两者在栖息地、食性和保护状态上差异显著。"
    }}
  ]

