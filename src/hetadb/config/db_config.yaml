postgres_batch_size: 500

# Maximum number of dataset parse tasks that run concurrently.
# Each task internally uses graph.max_workers threads for LLM calls, so the
# effective LLM concurrency = parse_max_workers × llm.max_concurrent_requests.
# Tune this to stay within your LLM provider's rate limit.
parse_max_workers: 1

parameter:
  chunk_config:
    chunk_size: 1024
    overlap: 50
    max_batch_bytes: 3221225472
    max_workers: 16

  graph_config:
    entity_schema_csv_path:
    relation_schema_csv_path:
    batch_size: 2000
    max_workers: 200
    max_file_size_bytes: 3221225472

  graph_merge_config:
    parallel_batches: 16
    batch_size: 500

  vector_config:
    batch_size: 2000
    max_file_size_bytes: 3221225472
    num_threads: 8
    max_retries: 5
    retry_delay: 2
